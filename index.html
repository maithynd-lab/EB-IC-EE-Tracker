<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Úm ba la mở ra mớ task</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#EBEEF3; --panel:#FFFFFF; --ink:#23262F; --muted:#8B909E; --line:rgba(20,22,30,.08);
    --shadow:0 1px 2px rgba(20,22,30,.05), 0 6px 18px rgba(20,22,30,.06);
    --shadow-lift:0 2px 6px rgba(20,22,30,.08), 0 16px 40px rgba(20,22,30,.12);
    --r-lg:22px; --r-md:16px; --r-sm:11px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;font-size:14px}
  button{font-family:inherit}
  ::selection{background:rgba(232,67,147,.18)}

  .app{display:flex;flex-direction:column;height:100vh;min-width:920px}
  .app.bg-grid{background-image:
    linear-gradient(rgba(40,58,90,.055) 1px,transparent 1px),
    linear-gradient(90deg,rgba(40,58,90,.055) 1px,transparent 1px);
    background-size:30px 30px}
  .app.bg-dots{background-image:radial-gradient(rgba(40,58,90,.08) 1.3px,transparent 1.3px);background-size:20px 20px}
  .app.bg-plain{background-image:none}
  .brand-tag{display:inline-block;font-family:ui-monospace,'SFMono-Regular',Menlo,monospace;font-size:10px;
    font-weight:700;letter-spacing:.14em;color:#fff;background:linear-gradient(135deg,#E84393,#F97316);
    padding:2px 7px;border-radius:6px;vertical-align:middle;margin-left:9px;transform:translateY(-2px)}
  .scopeseg{box-shadow:inset 0 0 0 1px rgba(20,22,30,.04)}

  /* topbar */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:24px;
    padding:16px 26px;background:rgba(255,255,255,.7);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);flex-shrink:0}
  .brand{display:flex;align-items:center;gap:13px}
  .brand-mark{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;color:#fff;
    background:linear-gradient(135deg,#E84393,#F97316);box-shadow:0 4px 12px rgba(232,67,147,.3)}
  .brand h1{margin:0;font-size:18px;font-weight:800;letter-spacing:-.02em}
  .brand p{margin:2px 0 0;font-size:12px;color:var(--muted);font-weight:500}
  .toolbar{display:flex;align-items:center;gap:14px}
  .sortwrap{display:flex;align-items:center;gap:9px;color:var(--muted)}
  .sort-lbl{font-size:12px;font-weight:600}

  /* board */
  .page{flex:1;min-height:0;overflow-y:auto}
  .board{display:flex;gap:18px;align-items:flex-start;padding:18px 26px 6px}
  .col{flex:1;min-width:288px;display:flex;flex-direction:column;border-radius:var(--r-lg);
    background:color-mix(in srgb, var(--accent) 6%, #fff);
    border:1px solid color-mix(in srgb, var(--accent) 16%, var(--line));
    box-shadow:var(--shadow);overflow:hidden}
  .col-head{display:flex;align-items:center;gap:11px;padding:15px 16px 13px;flex-shrink:0;
    background:color-mix(in srgb, var(--accent) 12%, #fff);
    border-bottom:1px solid color-mix(in srgb, var(--accent) 14%, transparent)}
  .avatar{width:32px;height:32px;border-radius:10px;display:grid;place-items:center;color:#fff;
    font-weight:800;font-size:15px;flex-shrink:0;box-shadow:0 2px 6px color-mix(in srgb,var(--accent) 45%,transparent)}
  .avatar.sm{width:22px;height:22px;border-radius:7px;font-size:11px}
  .col-meta{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
  .col-name{font-weight:700;font-size:15px;letter-spacing:-.01em}
  .col-count{font-size:11.5px;color:var(--muted);font-weight:500}

  .col-list{display:flex;flex-direction:column;gap:10px;min-height:90px;
    padding:13px;scrollbar-width:thin;scrollbar-color:color-mix(in srgb,var(--accent) 30%,transparent) transparent}
  .col-list::-webkit-scrollbar{width:8px}
  .col-list::-webkit-scrollbar-thumb{background:color-mix(in srgb,var(--accent) 26%,transparent);
    border-radius:8px;border:2px solid transparent;background-clip:content-box}

  /* card */
  .card{position:relative;display:flex;gap:11px;padding:13px 14px;background:var(--panel);
    border:1px solid var(--line);border-radius:var(--r-md);box-shadow:var(--shadow);cursor:pointer;
    transition:transform .14s cubic-bezier(.3,.7,.4,1),box-shadow .14s,opacity .2s}
  .card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lift)}
  .card.dragging{opacity:.4;transform:scale(.98) rotate(-.5deg)}
  .card.done{opacity:.62;background:#FAFAF9;box-shadow:none}
  .card.done:hover{opacity:.85}
  .card.done .card-title{text-decoration:line-through;color:var(--muted);text-decoration-thickness:1.5px}
  .card.done .tag{filter:grayscale(.55) opacity(.85)}

  .card-check{flex-shrink:0;width:21px;height:21px;margin-top:1px;border-radius:7px;
    border:1.8px solid color-mix(in srgb,var(--accent) 55%,#cfd2da);background:#fff;
    display:grid;place-items:center;color:#fff;cursor:pointer;transition:.14s}
  .card-check:hover{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 10%,#fff)}
  .card.done .card-check{background:var(--accent);border-color:var(--accent)}
  .card-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:7px}
  .card-tags{display:flex;flex-wrap:wrap;gap:5px}
  .tag{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:999px;
    font-size:11px;font-weight:600;line-height:1.5;white-space:nowrap;max-width:100%;
    overflow:hidden;text-overflow:ellipsis}
  .card-title{font-size:14px;font-weight:600;line-height:1.35;letter-spacing:-.01em;word-break:break-word;text-wrap:pretty}
  .card-note{font-size:12.5px;color:var(--muted);line-height:1.4;font-weight:500;text-wrap:pretty}
  .card-foot{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-top:1px}
  .prio{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;
    color:var(--pc);padding:2px 9px 2px 7px;border-radius:999px;
    background:color-mix(in srgb,var(--pc) 12%,#fff)}
  .prio-dot{width:7px;height:7px;border-radius:50%;background:var(--pc)}
  .due{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;color:var(--muted)}
  .due.over{color:#E5484D}

  .drop-line{height:3px;border-radius:3px;background:var(--accent);margin:-4px 4px;
    box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 18%,transparent)}
  .col-empty{padding:20px 8px;text-align:center;font-size:12.5px;color:var(--muted);font-weight:500}
  .done-sep{display:flex;align-items:center;gap:8px;margin:4px 2px 0;font-size:11px;font-weight:700;
    text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
  .done-sep::after{content:"";flex:1;height:1px;background:var(--line)}

  .quickadd{padding:11px 13px;border-top:1px solid color-mix(in srgb,var(--accent) 12%,transparent);flex-shrink:0}
  .quickadd input{width:100%;border:1px dashed color-mix(in srgb,var(--accent) 35%,#d6d8df);
    background:color-mix(in srgb,var(--accent) 5%,#fff);border-radius:11px;padding:9px 12px;
    font:inherit;font-size:13px;font-weight:500;color:var(--ink);outline:none;transition:.14s}
  .quickadd input::placeholder{color:color-mix(in srgb,var(--accent) 55%,var(--muted));font-weight:600}
  .quickadd input:focus{border-style:solid;border-color:var(--accent);
    background:#fff;box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 14%,transparent)}

  /* generic controls */
  .iconbtn{display:grid;place-items:center;width:32px;height:32px;border-radius:10px;border:0;
    background:transparent;color:var(--ink);cursor:pointer;transition:.14s}
  .iconbtn:hover{background:rgba(20,22,30,.06)}
  .iconbtn.sm{width:26px;height:26px;border-radius:8px}
  .iconbtn.add{color:color-mix(in srgb,var(--accent) 70%,#000);
    background:color-mix(in srgb,var(--accent) 14%,#fff)}
  .iconbtn.add:hover{background:color-mix(in srgb,var(--accent) 24%,#fff)}

  .seg{display:flex;gap:2px;padding:3px;border-radius:11px;background:rgba(20,22,30,.05)}
  .seg.compact{padding:2px}
  .seg-btn{flex:1;border:0;background:transparent;color:var(--muted);font:inherit;font-size:12.5px;
    font-weight:600;padding:6px 12px;border-radius:8px;cursor:pointer;white-space:nowrap;transition:.12s}
  .seg.compact .seg-btn{padding:5px 11px}
  .seg-btn:hover{color:var(--ink)}
  .seg-btn.on{background:#fff;color:var(--seg,var(--ink));box-shadow:0 1px 3px rgba(20,22,30,.12);font-weight:700}

  .btn{display:inline-flex;align-items:center;gap:7px;border:0;border-radius:11px;padding:9px 16px;
    font:inherit;font-size:13.5px;font-weight:700;cursor:pointer;transition:.14s;white-space:nowrap}
  .btn.primary{background:var(--ink);color:#fff}
  .btn.primary:hover{background:#000}
  .btn.primary:disabled{opacity:.4;cursor:not-allowed}
  .btn.ghost{background:rgba(20,22,30,.06);color:var(--ink)}
  .btn.ghost:hover{background:rgba(20,22,30,.1)}
  .btn.danger-ghost{background:transparent;color:#E5484D;padding-left:10px}
  .btn.danger-ghost:hover{background:rgba(229,72,77,.1)}

  /* modal */
  .scrim{position:fixed;inset:0;z-index:1000;background:rgba(20,22,30,.34);backdrop-filter:blur(4px);
    display:grid;place-items:center;padding:24px;animation:fade .16s ease}
  @keyframes fade{from{opacity:0}}
  .modal{width:min(480px,100%);max-height:calc(100vh - 48px);overflow:visible;background:var(--panel);
    border-radius:var(--r-lg);box-shadow:0 24px 70px rgba(20,22,30,.32);display:flex;flex-direction:column;
    animation:pop .18s cubic-bezier(.3,.7,.4,1)}
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98)}}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 14px 20px;
    border-bottom:1px solid var(--line)}
  .modal-owner{display:flex;align-items:center;gap:9px;font-size:13.5px;font-weight:700}
  .modal-body{padding:18px 20px;display:flex;flex-direction:column;gap:17px;overflow:visible}
  .title-input{border:0;border-bottom:2px solid var(--line);padding:4px 2px 9px;font:inherit;
    font-size:19px;font-weight:700;letter-spacing:-.02em;outline:none;color:var(--ink);background:transparent}
  .title-input::placeholder{color:#C2C5CE}
  .title-input:focus{border-color:var(--accent)}
  .field{display:flex;flex-direction:column;gap:8px}
  .field-row{display:flex;gap:14px}
  .field-row .field{flex:1}
  .label{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--muted);
    text-transform:uppercase;letter-spacing:.04em}
  .label svg{color:var(--accent)}
  .textarea{border:1px solid var(--line);border-radius:12px;padding:10px 12px;font:inherit;font-size:13.5px;
    resize:vertical;outline:none;color:var(--ink);background:#FBFBFA;line-height:1.45}
  .textarea:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 12%,transparent)}

  .modal-foot{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;
    border-top:1px solid var(--line)}
  .foot-right{display:flex;gap:9px}

  /* tag picker */
  .tagpicker{position:relative}
  .tagpicker-field{display:flex;flex-wrap:wrap;gap:6px;align-items:center;min-height:42px;padding:7px 10px;
    border:1px solid var(--line);border-radius:12px;background:#FBFBFA;cursor:text}
  .tagpicker-field:focus-within{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 12%,transparent)}
  .tag-rm{padding-right:4px}
  .tag-rm button{display:grid;place-items:center;border:0;background:rgba(0,0,0,.08);border-radius:50%;
    width:15px;height:15px;cursor:pointer;color:inherit;padding:0;margin-left:1px}
  .tag-rm button:hover{background:rgba(0,0,0,.18)}
  .tagpicker-input{flex:1;min-width:90px;border:0;background:transparent;font:inherit;font-size:13px;
    font-weight:500;outline:none;color:var(--ink);padding:3px 0}
  .tagpicker-menu{position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:20;background:#fff;
    border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow-lift);padding:7px;
    max-height:230px;overflow-y:auto}
  .tagpicker-list{display:flex;flex-direction:column;gap:2px}
  .tagpicker-opt{display:flex;border:0;background:transparent;padding:6px 7px;border-radius:8px;cursor:pointer;text-align:left}
  .tagpicker-opt:hover{background:rgba(20,22,30,.05)}
  .tagpicker-create{padding:8px 7px 4px;border-top:1px solid var(--line);margin-top:5px}
  .tagpicker-create:first-child{border-top:0;margin-top:0}
  .tagpicker-create-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .muted-lbl{font-size:12px;color:var(--muted);font-weight:600}
  .tagpicker-empty{padding:9px 8px;font-size:12.5px;color:var(--muted);font-weight:500}
  .swatches{display:flex;flex-wrap:wrap;gap:7px}
  .swatch{width:24px;height:24px;border-radius:8px;border:2px solid #fff;cursor:pointer;padding:0;
    box-shadow:0 0 0 1px var(--line);transition:transform .12s}
  .swatch:hover{transform:scale(1.12)}
  .swatch.on{box-shadow:0 0 0 2px var(--ink)}

  /* due picker */
  .due-picker{position:relative}
  .due-btn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:11px;
    padding:9px 14px;background:#FBFBFA;font:inherit;font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer;transition:.14s}
  .due-btn:hover{border-color:color-mix(in srgb,var(--accent) 40%,var(--line))}
  .due-btn.set{color:var(--ink)}
  .due-btn.set svg{color:var(--accent)}
  .due-btn.over{color:#E5484D}.due-btn.over svg{color:#E5484D}

  /* calendar */
  .cal{position:absolute;top:calc(100% + 8px);left:0;z-index:30;width:262px;background:#fff;
    border:1px solid var(--line);border-radius:15px;box-shadow:var(--shadow-lift);padding:12px}
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .cal-title{font-size:13.5px;font-weight:700}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
  .cal-dow-row{margin-bottom:3px}
  .cal-dow{text-align:center;font-size:10.5px;font-weight:700;color:var(--muted);padding:3px 0}
  .cal-day{height:32px;border:0;background:transparent;border-radius:9px;font:inherit;font-size:13px;
    font-weight:600;color:var(--ink);cursor:pointer;transition:.1s}
  .cal-day:hover{background:rgba(20,22,30,.07)}
  .cal-day.muted{color:#C9CCD4;pointer-events:none;font-weight:500}
  .cal-day.today{color:var(--accent);font-weight:800}
  .cal-day.sel{background:var(--accent);color:#fff;font-weight:700}
  .cal-day.sel:hover{background:var(--accent)}
  .cal-foot{display:flex;justify-content:space-between;margin-top:9px;padding-top:9px;border-top:1px solid var(--line)}
  .cal-link{border:0;background:transparent;font:inherit;font-size:12.5px;font-weight:700;color:var(--accent);cursor:pointer;padding:3px 5px;border-radius:7px}
  .cal-link:hover{background:color-mix(in srgb,var(--accent) 12%,#fff)}
  .cal-link.muted{color:var(--muted)}

  /* ── view switcher ── */
  .viewseg{padding:3px}
  .viewseg .seg-btn{padding:6px 16px;font-size:13px}

  /* ── report shells ── */
  .report-main{flex:1;min-height:0;overflow-y:auto;padding:18px 26px 32px}
  .subbar{display:flex;align-items:center;gap:16px;margin-bottom:18px}
  .period-nav{display:flex;align-items:center;gap:6px}
  .period-label{font-size:16px;font-weight:800;letter-spacing:-.02em;min-width:172px;text-align:center}
  .subbar-title{flex:1;text-align:center;font-size:12.5px;font-weight:700;color:var(--muted);
    text-transform:uppercase;letter-spacing:.05em}
  .btn.sm{padding:6px 12px;font-size:12.5px}
  .btn.export{color:#fff;background:linear-gradient(135deg,#E84393,#F97316);
    box-shadow:0 4px 12px rgba(232,67,147,.28)}
  .btn.export:hover{filter:brightness(1.05)}

  /* ── week report ── */
  .week-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;align-items:start}
  .pcard{background:var(--panel);border:1px solid var(--line);border-top:3px solid var(--accent);
    border-radius:var(--r-lg);box-shadow:var(--shadow);padding:16px 17px 18px;display:flex;flex-direction:column;gap:14px}
  .pcard-head{display:flex;align-items:center;gap:10px}
  .pcard-name{font-size:16px;font-weight:700;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .stat{display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 4px;border-radius:13px;
    background:rgba(20,22,30,.04)}
  .stat b{font-size:21px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
  .stat span{display:flex;align-items:center;gap:3px;font-size:11px;font-weight:600;color:var(--muted)}
  .stat.done{background:rgba(34,197,94,.1)} .stat.done b{color:#16A34A}
  .stat.doing{background:color-mix(in srgb,var(--accent) 11%,#fff)} .stat.doing b{color:color-mix(in srgb,var(--accent) 70%,#000)}
  .stat.over{background:rgba(229,72,77,.1)} .stat.over b{color:#E5484D}
  .rep-block{display:flex;flex-direction:column;gap:3px}
  .rep-h{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:4px}
  .rep-empty{font-size:12.5px;color:var(--muted);font-weight:500;padding:5px 2px}
  .rep-row{display:flex;align-items:center;gap:8px;width:100%;border:0;background:transparent;text-align:left;
    padding:7px 8px;border-radius:9px;cursor:pointer;font:inherit;transition:.12s}
  .rep-row:hover{background:rgba(20,22,30,.05)}
  .rep-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0}
  .rep-title{flex:1;min-width:0;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rep-row.done .rep-dot{background:#16A34A}
  .rep-row.done .rep-title{text-decoration:line-through;color:var(--muted)}
  .tag.mini{font-size:10px;padding:1px 7px;flex-shrink:0}
  .rep-date{font-size:11px;font-weight:600;color:var(--muted);flex-shrink:0}

  /* ── month report ── */
  .month-wrap{max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:18px}
  .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--r-md);box-shadow:var(--shadow);
    padding:18px 20px;display:flex;flex-direction:column;gap:4px}
  .kpi b{font-size:30px;font-weight:800;line-height:1;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .kpi span{font-size:12.5px;font-weight:600;color:var(--muted)}
  .kpi.warn b{color:#E5484D}
  .charts{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .chart-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow);padding:20px 22px}
  .chart-h{font-size:14px;font-weight:700;margin-bottom:16px;letter-spacing:-.01em}
  .bars{display:flex;flex-direction:column;gap:11px}
  .bar-row{display:grid;grid-template-columns:84px 1fr 26px;align-items:center;gap:11px}
  .bar-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar-track{height:13px;background:rgba(20,22,30,.06);border-radius:999px;overflow:hidden}
  .bar-fill{height:100%;border-radius:999px;min-width:5px;transition:width .4s cubic-bezier(.3,.7,.4,1)}
  .bar-val{font-size:13px;font-weight:700;text-align:right;font-variant-numeric:tabular-nums}
  .rate-list{margin-top:16px;padding-top:14px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:9px}
  .rate-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .rate-name{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rate-name i{width:9px;height:9px;border-radius:3px;flex-shrink:0}
  .rate-pct{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap;flex-shrink:0}
  .rate-pct small{font-size:11px;font-weight:600;color:var(--muted)}
  .donut-wrap{display:flex;align-items:center;gap:20px}
  .donut{flex-shrink:0}
  .donut-num{font-size:30px;font-weight:800;fill:var(--ink);text-anchor:middle;font-family:inherit}
  .donut-lbl{font-size:11px;font-weight:600;fill:var(--muted);text-anchor:middle;font-family:inherit}
  .legend{flex:1;min-width:0;display:flex;flex-direction:column;gap:9px}
  .legend-item{display:flex;align-items:center;gap:9px}
  .legend-item i{width:11px;height:11px;border-radius:3px;flex-shrink:0}
  .legend-name{flex:1;min-width:0;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .legend-val{font-size:13px;font-weight:800;font-variant-numeric:tabular-nums}

  /* ── avatar xs / tag button ── */
  .avatar.xs{width:22px;height:22px;border-radius:7px;font-size:11px;box-shadow:none}
  .iconbtn.tagbtn{color:var(--ink)}
  .iconbtn.danger{color:#E5484D}
  .iconbtn.danger:hover{background:rgba(229,72,77,.1)}

  /* ── events section ── */
  .events{padding:14px 26px 40px;max-width:1240px}
  .events-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:18px 0 16px}
  .events-head h2{margin:0;font-size:19px;font-weight:800;letter-spacing:-.02em}
  .events-head p{margin:3px 0 0;font-size:12.5px;color:var(--muted);font-weight:500}
  .events-empty{display:flex;align-items:center;gap:10px;padding:22px;border:1.5px dashed var(--line);
    border-radius:var(--r-lg);color:var(--muted);font-size:13.5px;font-weight:500;background:rgba(255,255,255,.5)}
  .events-empty-emoji{font-size:22px}
  .events-empty b{color:var(--ink);font-weight:700}
  .events-list{display:flex;flex-direction:column;gap:16px}

  .event-block{background:var(--panel);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow);overflow:hidden}
  .event-block.past{opacity:.72}
  .event-head{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 18px;
    background:color-mix(in srgb,var(--accent) 9%,#fff);border-bottom:1px solid color-mix(in srgb,var(--accent) 14%,transparent)}
  .event-head-l{display:flex;align-items:center;gap:12px;min-width:0}
  .event-dot{width:12px;height:12px;border-radius:4px;background:var(--accent);flex-shrink:0;
    box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 16%,transparent)}
  .event-titles{min-width:0}
  .event-name{font-size:17px;font-weight:800;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .event-meta{display:flex;align-items:center;gap:5px;font-size:12.5px;color:var(--muted);font-weight:600;margin-top:1px}
  .event-head-r{display:flex;align-items:center;gap:10px;flex-shrink:0}
  .event-owners{display:flex}
  .event-owners .avatar{margin-left:-6px;box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 9%,#fff)}
  .event-owners .avatar:first-child{margin-left:0}
  .event-dbadge{font-size:13px;font-weight:800;padding:4px 11px;border-radius:999px;
    background:color-mix(in srgb,var(--accent) 16%,#fff);color:color-mix(in srgb,var(--accent) 75%,#000);
    font-variant-numeric:tabular-nums;letter-spacing:.02em}
  .event-dbadge.hot{background:var(--accent);color:#fff}

  .event-progress{display:flex;align-items:center;gap:12px;padding:13px 18px 0}
  .event-progress-track{flex:1;height:8px;border-radius:999px;background:rgba(20,22,30,.07);overflow:hidden}
  .event-progress-bar{height:100%;border-radius:999px;background:var(--accent);transition:width .4s cubic-bezier(.3,.7,.4,1)}
  .event-progress-lbl{font-size:12px;font-weight:700;color:var(--muted);white-space:nowrap;font-variant-numeric:tabular-nums}

  .event-tasks{padding:8px 14px 4px;display:flex;flex-direction:column;gap:1px}
  .ev-row{display:flex;align-items:center;gap:10px;padding:7px 6px;border-radius:9px;transition:.12s}
  .ev-row:hover{background:rgba(20,22,30,.04)}
  .card-check.sm{width:19px;height:19px;border-radius:6px;margin-top:0}
  .ev-title{flex:1;min-width:0;border:0;background:transparent;text-align:left;font:inherit;font-size:13.5px;
    font-weight:600;color:var(--ink);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0}
  .ev-row.done .ev-title{text-decoration:line-through;color:var(--muted)}
  .ev-row.done .card-check.sm{background:var(--accent);border-color:var(--accent)}

  .event-add{display:flex;align-items:center;gap:10px;padding:10px 16px 16px}
  .owner-pick{display:flex;gap:5px}
  .avatar.xs.pick{cursor:pointer;font-weight:800;transition:.12s}
  .avatar.xs.pick:hover{transform:translateY(-1px)}
  .event-add-input{flex:1;border:1px dashed var(--line);background:#FBFBFA;border-radius:10px;padding:8px 12px;
    font:inherit;font-size:13px;font-weight:500;color:var(--ink);outline:none}
  .event-add-input:focus{border-style:solid;border-color:var(--accent);background:#fff;
    box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 12%,transparent)}

  .events-past{margin-top:18px}
  .past-toggle{display:flex;align-items:center;gap:7px;border:0;background:transparent;font:inherit;
    font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;padding:6px 4px;margin-bottom:10px}
  .past-toggle:hover{color:var(--ink)}

  /* ── tag manager ── */
  .tagm-modal{width:min(560px,100%)}
  .tagm-body{gap:14px}
  .tagm-hint{font-size:12.5px;color:var(--muted);font-weight:500;line-height:1.45}
  .tagm-hint b{color:var(--ink);font-weight:700}
  .tagm-list{display:flex;flex-direction:column;gap:7px;max-height:46vh;overflow-y:auto;margin:0 -4px;padding:2px 4px}
  .tagm-row{display:flex;align-items:center;gap:9px;position:relative}
  .tagm-swatch-wrap{position:relative;flex-shrink:0}
  .tagm-swatch{width:26px;height:26px;border-radius:8px;border:2px solid #fff;box-shadow:0 0 0 1px var(--line);cursor:pointer;padding:0}
  .tagm-name{flex:1;min-width:0;border:1px solid var(--line);border-radius:9px;padding:7px 10px;font:inherit;
    font-size:13.5px;font-weight:600;color:var(--ink);background:#FBFBFA;outline:none}
  .tagm-name:focus{border-color:#8B5CF6;background:#fff}
  .tagm-date-wrap{position:relative;flex-shrink:0}
  .tagm-date{display:flex;align-items:center;gap:5px;border:1px solid var(--line);border-radius:9px;padding:7px 10px;
    background:#FBFBFA;font:inherit;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap}
  .tagm-date.set{color:#fff;background:#8B5CF6;border-color:#8B5CF6}
  .tagm-date:hover{border-color:#8B5CF6}
  .tagm-count{font-size:11.5px;font-weight:700;color:var(--muted);min-width:18px;text-align:center;font-variant-numeric:tabular-nums}
  .pop{position:absolute;top:calc(100% + 6px);right:0;z-index:40;background:#fff;border:1px solid var(--line);
    border-radius:13px;box-shadow:var(--shadow-lift);padding:10px}
  .swatches-pop{left:0;right:auto;display:flex;flex-wrap:wrap;gap:7px;width:176px}
  .tagm-add{border-top:1px solid var(--line);padding-top:14px;display:flex;flex-direction:column;gap:10px}
  .tagm-add-swatches{display:flex;flex-wrap:wrap;gap:7px}
  .tagm-add-row{display:flex;align-items:center;gap:9px}

  /* ── event dashboard ── */
  .event-dash{display:flex;gap:16px;padding:14px 18px 4px}
  .event-cover{width:300px;flex-shrink:0;aspect-ratio:16/9;border-radius:14px;overflow:hidden;
    background:color-mix(in srgb,var(--accent) 8%,#f4f4f6);border:1px solid var(--line)}
  .event-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:10px}
  .event-desc{width:100%;border:1px solid var(--line);border-radius:11px;padding:9px 11px;font:inherit;
    font-size:13px;font-weight:500;color:var(--ink);background:#FBFBFA;resize:none;outline:none;line-height:1.45}
  .event-desc:focus{border-color:var(--accent);background:#fff}
  .event-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .info-field{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:10px;
    padding:0 10px;background:#FBFBFA;height:34px}
  .info-field:focus-within{border-color:var(--accent);background:#fff}
  .info-ic{color:var(--accent);display:flex;flex-shrink:0}
  .info-field input{flex:1;min-width:0;border:0;background:transparent;font:inherit;font-size:12.5px;font-weight:600;color:var(--ink);outline:none}
  .info-field input::placeholder{color:var(--muted);font-weight:500}

  /* ── event phases ── */
  .phases{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:10px 16px 16px}
  .phase{background:color-mix(in srgb,var(--accent) 5%,#fafafa);border:1px solid var(--line);border-radius:14px;
    padding:10px;display:flex;flex-direction:column;gap:6px;min-height:96px;transition:.15s}
  .phase.dropping{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 12%,#fff);
    box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 14%,transparent)}
  .phase-h{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:800;color:var(--ink);
    text-transform:uppercase;letter-spacing:.03em;padding:2px 4px}
  .phase-dot{width:8px;height:8px;border-radius:3px;background:var(--accent)}
  .phase-count{margin-left:auto;font-size:11px;font-weight:700;color:var(--muted);background:rgba(20,22,30,.06);
    border-radius:999px;padding:1px 8px;text-transform:none;letter-spacing:0}
  .phase-tasks{display:flex;flex-direction:column;gap:2px;min-height:30px}
  .phase-empty{font-size:11.5px;color:var(--muted);font-weight:500;text-align:center;padding:10px 4px;
    border:1px dashed var(--line);border-radius:9px}
  .ev-row[draggable]{cursor:grab}
  .ev-row.dragging{opacity:.4}
  .phase-add{display:flex;align-items:center;gap:7px;margin-top:2px}
  .owner-pick.sm .avatar.xs.pick{width:19px;height:19px;font-size:10px}
  .phase-add-input{flex:1;min-width:0;border:1px dashed var(--line);background:#fff;border-radius:9px;
    padding:6px 9px;font:inherit;font-size:12px;font-weight:500;color:var(--ink);outline:none}
  .phase-add-input:focus{border-style:solid;border-color:var(--accent);box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 12%,transparent)}

  /* ── comm calendar ── */
  .comm-body{display:flex;gap:16px;align-items:flex-start}
  .comm-body .comm-grid{flex:1;min-width:0}
  .comm-notes{width:248px;flex-shrink:0;background:var(--panel);border:1px solid var(--line);
    border-radius:var(--r-lg);box-shadow:var(--shadow);padding:14px;display:flex;flex-direction:column;gap:10px;
    align-self:stretch}
  .comm-notes-h{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:800;color:var(--ink);
    text-transform:uppercase;letter-spacing:.03em}
  .comm-notes-h svg{color:#3B82F6}
  .comm-notes-ta{flex:1;min-height:280px;border:1px solid var(--line);border-radius:12px;padding:10px 11px;
    font:inherit;font-size:13px;font-weight:500;line-height:1.5;color:var(--ink);background:#FBFBFA;resize:none;outline:none}
  .comm-notes-ta:focus{border-color:#3B82F6;background:#fff}
  .comm{padding:14px 26px 48px;max-width:1240px}
  .comm-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:24px 0 16px}
  .comm-head h2{margin:0;font-size:19px;font-weight:800;letter-spacing:-.02em}
  .comm-head p{margin:3px 0 0;font-size:12.5px;color:var(--muted);font-weight:500}
  .comm-toolbar{display:flex;align-items:center;gap:12px}
  .period-label.sm{font-size:14px;min-width:118px}
  .comm-viewseg .seg-btn{padding:6px 10px;display:flex;align-items:center}

  .comm-grid{border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;background:var(--panel);box-shadow:var(--shadow)}
  .comm-dow-row{display:grid;grid-template-columns:repeat(7,1fr);background:#FAFAF9;border-bottom:1px solid var(--line)}
  .comm-dow{text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:9px 0;text-transform:uppercase;letter-spacing:.04em}
  .comm-cells{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:minmax(110px,auto)}
  .comm-cell{border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:5px;display:flex;flex-direction:column;gap:3px;min-width:0}
  .comm-cell:nth-child(7n){border-right:0}
  .comm-cell.muted{background:#FBFBFA}
  .comm-cell.today{background:color-mix(in srgb,#3B82F6 6%,#fff)}
  .comm-cell-h{display:flex;align-items:center;justify-content:space-between}
  .comm-day{font-size:12.5px;font-weight:700;color:var(--ink);padding:2px 6px}
  .comm-cell.today .comm-day{background:#3B82F6;color:#fff;border-radius:7px}
  .comm-add{opacity:0;display:grid;place-items:center;width:20px;height:20px;border:0;background:transparent;color:var(--muted);border-radius:6px;cursor:pointer;transition:.12s}
  .comm-cell:hover .comm-add{opacity:1}
  .comm-add:hover{background:rgba(20,22,30,.08);color:var(--ink)}
  .comm-cell-posts{display:flex;flex-direction:column;gap:3px;overflow:hidden}
  .cpost{display:flex;align-items:center;gap:5px;padding:3px 6px;border-radius:7px;background:#fff;
    border:1px solid var(--line);border-left:3px solid transparent;cursor:pointer;transition:.12s;text-align:left;width:100%}
  .cpost:hover{background:rgba(20,22,30,.04)}
  .cpost.posted{opacity:.6}
  .cpost.posted .cpost-title{text-decoration:line-through;color:var(--muted)}
  .cpost-check{flex-shrink:0;width:15px;height:15px;border-radius:5px;border:1.6px solid #cfd2da;background:#fff;display:grid;place-items:center;color:#fff;cursor:pointer;padding:0}
  .cpost-check:hover{border-color:#22C55E}
  .cpost.posted .cpost-check,.comm-list-row.posted .cpost-check{background:#22C55E;border-color:#22C55E}
  .cpost-dots{display:flex;gap:2px;flex-shrink:0}
  .cpost-dots i{width:6px;height:6px;border-radius:50%}
  .cpost-title{font-size:11.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}

  .comm-list{display:flex;flex-direction:column;gap:18px}
  .comm-list-date{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:7px}
  .comm-list-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--panel);
    border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);cursor:pointer;margin-bottom:6px;transition:.12s}
  .comm-list-row:hover{transform:translateY(-1px);box-shadow:var(--shadow-lift)}
  .comm-list-row.posted{opacity:.62}
  .comm-list-row.posted .comm-list-title{text-decoration:line-through;color:var(--muted)}
  .comm-list-title{flex:1;min-width:0;font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .comm-list-chs{display:flex;gap:5px;flex-shrink:0}

  /* ── post editor extras ── */
  .post-select{width:100%;height:42px;border:1px solid var(--line);border-radius:12px;padding:0 12px;
    font:inherit;font-size:13.5px;font-weight:600;color:var(--ink);background:#FBFBFA;outline:none}
  .post-select:focus{border-color:var(--accent);background:#fff}
  .avatar.pick-lg{width:34px;height:34px;border-radius:10px;font-size:14px;cursor:pointer;background:transparent;box-shadow:none}
  .posted-row{display:flex;align-items:center;gap:10px;font-size:13.5px;font-weight:700;cursor:pointer;
    padding:10px 12px;border-radius:12px;background:rgba(34,197,94,.08)}
  .posted-row .card-check{position:static;width:21px;height:21px;margin-top:0}

  /* ── print ── */
  @media print{
    body{background:#fff}
    .app{height:auto;min-width:0}
    .topbar .toolbar,.period-nav .iconbtn,.period-nav .btn,.btn.export,.twk-panel,[data-omelette-chrome]{display:none !important}
    .report-main{overflow:visible;padding:0}
    .subbar{margin-bottom:14px}
    .card,.pcard,.chart-card,.kpi{box-shadow:none !important}
    .bar-fill{transition:none}
    @page{margin:14mm}
  }
  /* ── sync indicator ── */
  .sync-badge{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;
    color:var(--muted);padding:5px 11px;border-radius:99px;background:rgba(20,22,30,.05)}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:#E5E7EB;transition:background .4s;flex-shrink:0}
  @keyframes sync-pulse{0%,100%{opacity:1}50%{opacity:.35}}
</style>
</head>
